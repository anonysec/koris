name: koris
services:
  # ============================================================
  # Database - TimescaleDB for time-series metrics + relational
  # ============================================================
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: koris-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-koris}
      POSTGRES_USER: ${POSTGRES_USER:-koris}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-koris}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    mem_limit: 2048m
    cpus: '2.0'
    networks:
      - koris-internal

  # ============================================================
  # API Gateway - Entry point with TLS, rate limiting, routing
  # ============================================================
  gateway:
    build:
      context: ..
      dockerfile: Dockerfile.gateway
    image: koris-gateway:latest
    container_name: koris-gateway
    ports:
      - "443:443"
      - "2025:2025"  # gRPC port for internal services
    environment:
      GATEWAY_LISTEN_ADDR: ":443"
      GATEWAY_GRPC_ADDR: ":2025"
      GATEWAY_API_KEYS: ${GATEWAY_API_KEYS:-}
      GATEWAY_TLS_MODE: ${GATEWAY_TLS_MODE:-selfsigned}
      GATEWAY_TLS_CERT: ${GATEWAY_TLS_CERT:-/etc/koris/cert.pem}
      GATEWAY_TLS_KEY: ${GATEWAY_TLS_KEY:-/etc/koris/key.pem}
      GATEWAY_TLS_EMAIL: ${GATEWAY_TLS_EMAIL:-}
      GATEWAY_TLS_DOMAIN: ${GATEWAY_TLS_DOMAIN:-}
      GATEWAY_KORIS_PANEL_URL: http://panel:8080
      GATEWAY_WORKER_GRPC_ADDR: worker:2026
      GATEWAY_RATE_LIMIT_RPS: ${GATEWAY_RATE_LIMIT_RPS:-100}
      GATEWAY_RATE_LIMIT_BURST: ${GATEWAY_RATE_LIMIT_BURST:-200}
      GATEWAY_TRUSTED_PROXIES: ${GATEWAY_TRUSTED_PROXIES:-}
    volumes:
      - /etc/koris:/etc/koris:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - gateway-acme:/var/lib/gateway/acme
    depends_on:
      panel:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:443/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    mem_limit: 512m
    cpus: '1.0'
    networks:
      - koris-internal

  # ============================================================
  # Panel - Main admin dashboard and API
  # ============================================================
  panel:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        BUILD_TAGS: ${BUILD_TAGS:-}
    image: koris-panel:latest
    container_name: panel
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:2026:2026"  # gRPC port
    environment:
      PANEL_DEV_MODE: ${PANEL_DEV_MODE:-false}
      PANEL_SESSION_SECRET: ${PANEL_SESSION_SECRET:?PANEL_SESSION_SECRET required}
      PANEL_SETUP_KEY: ${PANEL_SETUP_KEY:-}
      PANEL_RADIUS_SECRET: ${PANEL_RADIUS_SECRET:-}
      PANEL_PG_DSN: postgres://${POSTGRES_USER:-koris}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-koris}?sslmode=disable
      PANEL_DOMAIN: ${PANEL_DOMAIN:-localhost}
      PANEL_ADMIN_PATH: ${PANEL_ADMIN_PATH:-/admin/}
      PANEL_PORTAL_PATH: ${PANEL_PORTAL_PATH:-/account/}
      PANEL_TLS_MODE: ${PANEL_TLS_MODE:-selfsigned}
      PANEL_TLS_CERT: ${PANEL_TLS_CERT:-/etc/koris/cert.pem}
      PANEL_TLS_KEY: ${PANEL_TLS_KEY:-/etc/koris/key.pem}
      PANEL_SMTP_HOST: ${PANEL_SMTP_HOST:-}
      PANEL_SMTP_PORT: ${PANEL_SMTP_PORT:-587}
      PANEL_SMTP_USER: ${PANEL_SMTP_USER:-}
      PANEL_SMTP_PASS: ${PANEL_SMTP_PASS:-}
      PANEL_SMTP_FROM: ${PANEL_SMTP_FROM:-noreply@localhost}
      PANEL_SMTP_ENABLED: ${PANEL_SMTP_ENABLED:-false}
      WORKER_GRPC_ADDR: worker:2026
      WORKER_API_KEY: ${WORKER_API_KEY:-}
    volumes:
      - /etc/koris:/etc/koris:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - panel-uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    mem_limit: 1024m
    cpus: '2.0'
    networks:
      - koris-internal

  # ============================================================
  # Worker - Background job processor (billing, email, reports)
  # ============================================================
  worker:
    build:
      context: ..
      dockerfile: Dockerfile.worker
    image: koris-worker:latest
    container_name: koris-worker
    environment:
      WORKER_PG_DSN: postgres://${POSTGRES_USER:-koris}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-koris}?sslmode=disable
      WORKER_GRPC_ADDR: ":2026"
      WORKER_API_KEY: ${WORKER_API_KEY:-}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
      PANEL_SMTP_HOST: ${PANEL_SMTP_HOST:-}
      PANEL_SMTP_PORT: ${PANEL_SMTP_PORT:-587}
      PANEL_SMTP_USER: ${PANEL_SMTP_USER:-}
      PANEL_SMTP_PASS: ${PANEL_SMTP_PASS:-}
      PANEL_SMTP_FROM: ${PANEL_SMTP_FROM:-noreply@localhost}
      PANEL_SMTP_ENABLED: ${PANEL_SMTP_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-false}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:2026/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    mem_limit: 512m
    cpus: '1.0'
    networks:
      - koris-internal

  # ============================================================
  # Knode - VPN server agent (can be on separate host)
  # ============================================================
  knode:
    build:
      context: ../knode
      dockerfile: Dockerfile
    image: koris-knode:latest
    container_name: knode
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "62051:62050"  # gRPC port
    environment:
      KNODE_API_KEYS: ${KNODE_API_KEYS:?KNODE_API_KEYS required}
      KNODE_PANEL_URL: ${KNODE_PANEL_URL:-http://panel:8080}
      KNODE_GRPC_PORT: "62050"
      KNODE_RADIUS_SECRET: ${KNODE_RADIUS_SECRET:-}
      KNODE_INSECURE_ALLOW_NO_AUTH: ${KNODE_INSECURE_ALLOW_NO_AUTH:-false}
    volumes:
      - knode-data:/var/lib/knode
      - /lib/modules:/lib/modules:ro
    depends_on:
      panel:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:62050/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    mem_limit: 512m
    cpus: '1.0'
    networks:
      - koris-internal

  # ============================================================
  # Optional: pgAdmin for database management
  # ============================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@localhost}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "127.0.0.1:5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - db
    restart: unless-stopped
    mem_limit: 512m
    cpus: '0.5'
    networks:
      - koris-internal
    profiles:
      - admin

  # ============================================================
  # Optional: Redis for job queue (scales workers)
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: koris-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    mem_limit: 256m
    cpus: '0.5'
    networks:
      - koris-internal
    profiles:
      - redis

  # ============================================================
  # Optional: Prometheus for metrics collection
  # ============================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: koris-prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    depends_on:
      - panel
      - worker
      - knode
    restart: unless-stopped
    mem_limit: 512m
    cpus: '1.0'
    networks:
      - koris-internal
    profiles:
      - monitoring

  # ============================================================
  # Optional: Grafana for dashboards
  # ============================================================
  grafana:
    image: grafana/grafana:latest
    container_name: koris-grafana
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    mem_limit: 256m
    cpus: '0.5'
    networks:
      - koris-internal
    profiles:
      - monitoring

# ============================================================
# Networks
# ============================================================
networks:
  koris-internal:
    driver: bridge
    name: koris-internal

# ============================================================
# Volumes
# ============================================================
volumes:
  db-data:
    name: koris-db-data
  panel-uploads:
    name: koris-panel-uploads
  knode-data:
    name: koris-knode-data
  gateway-acme:
    name: koris-gateway-acme
  pgadmin-data:
    name: koris-pgadmin-data
  redis-data:
    name: koris-redis-data
  prometheus-data:
    name: koris-prometheus-data
  grafana-data:
    name: koris-grafana-data
