name: koris

services:
  panel:
    container_name: koris
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "2026:2026"
      - "80:80"
      - "443:443"
    env_file:
      - docker/panel.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - panel-data:/var/lib/panel
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:2026/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  db:
    container_name: koris-db
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MYSQL_DATABASE: koris
      MYSQL_USER: koris
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  panel-data:
  db-data:
