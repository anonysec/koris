name: koris

# KorisPanel development / single-host deployment stack.
# NOTE: for production, override secrets (POSTGRES_PASSWORD, PGADMIN_PASSWORD,
# PANEL_*) via environment or a secrets manager - never commit them.

services:
  panel:
    container_name: koris
    # Release mode: docker pull $KORIS_IMAGE first, then `docker compose up`.
    # Source mode: leave KORIS_IMAGE unset, run `docker compose build && up`.
    image: ${KORIS_IMAGE:-koris:local}
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        BUILD_TAGS: ${BUILD_TAGS:-}
        # Vite base path — bundled asset URLs match runtime routing.
        KORIS_ADMIN_BASE: ${KORIS_ADMIN_BASE:-/admin/}
        KORIS_PORTAL_BASE: ${KORIS_PORTAL_BASE:-/account/}
    ports:
      - "${PANEL_PORT:-2026}:${PANEL_PORT:-2026}"
      - "80:80"
    environment:
      PANEL_PG_DSN: "postgres://${POSTGRES_USER:-koris}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-koris}?sslmode=disable"
      PANEL_DOMAIN: "${PANEL_DOMAIN:-localhost}"
      PANEL_DEV_MODE: "${PANEL_DEV_MODE:-false}"
      PANEL_SESSION_SECRET: "${PANEL_SESSION_SECRET:-change-me-in-prod}"
      PANEL_SETUP_KEY: "${PANEL_SETUP_KEY:-}"
      # URL routing — path prefixes or subdomains. See panel.env.
      PANEL_ADMIN_PATH: "${PANEL_ADMIN_PATH:-/admin/}"
      PANEL_PORTAL_PATH: "${PANEL_PORTAL_PATH:-/account/}"
      PANEL_ADMIN_HOST: "${PANEL_ADMIN_HOST:-}"
      PANEL_PORTAL_HOST: "${PANEL_PORTAL_HOST:-}"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - panel-data:/var/lib/koris
      - /etc/koris:/etc/koris
    restart: unless-stopped
    mem_limit: 1024m
    cpus: "1.0"
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-q", "--spider", "https://localhost:2026/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  db:
    container_name: koris-db
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-koris}
      POSTGRES_USER: ${POSTGRES_USER:-koris}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Bound to localhost only; the panel reaches it over the internal network.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    mem_limit: 2048m
    cpus: "2.0"

  pgadmin:
    container_name: koris-pgadmin
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@koris.local}
      # SECURITY: no insecure default - PGADMIN_PASSWORD must be provided.
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "True"
      PGADMIN_CONFIG_ENFORCE_PWD_PASSWORD: "True"
    # Do not expose pgAdmin publicly; bind to localhost (use a VPN/SSH tunnel).
    ports:
      - "127.0.0.1:${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 512m
    cpus: "0.5"

volumes:
  panel-data:
  db-data:
  pgadmin-data:
