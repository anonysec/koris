# buf.gen.yaml — Code generation config for Panel's knode proto client.
#
# Prerequisites:
#   go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
#   go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.2
#
# Usage with buf:
#   buf generate ../knode/proto
#
# Usage with protoc (alternative):
#   protoc --go_out=. --go_opt=paths=source_relative \
#          --go-grpc_out=. --go-grpc_opt=paths=source_relative \
#          --proto_path=../knode/proto \
#          ../knode/proto/knode/v1/knode.proto
#
# IMPORTANT: output lands at internal/knodepb (NOT panel/internal/knodepb).
# The committed code is imported as github.com/anonysec/koris/internal/knodepb,
# so both `go_package` and `out` MUST point there. A previous config wrote
# to panel/internal/knodepb, which does not compile.

version: v2
managed:
  enabled: true
  override:
    - file_option: go_package
      value: github.com/anonysec/koris/internal/knodepb
plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: internal/knodepb
    opt: paths=source_relative
  - remote: buf.build/grpc/go:v1.6.2
    out: internal/knodepb
    opt: paths=source_relative
