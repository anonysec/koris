name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend · Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: Verify modules
        run: go mod verify
      - name: Vet
        run: go vet ./...
      - name: Build (full)
        run: go build ./cmd/panel
      - name: Build (lite)
        run: go build -tags lite ./cmd/panel
      - name: Test
        run: go test ./... -count=1 -timeout=120s

  frontend:
    name: Frontend · pnpm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Enable pnpm
        run: corepack enable
      - name: Install
        run: pnpm install --no-frozen-lockfile
      - name: Build
        run: |
          pnpm --filter admin build
          pnpm --filter portal build
          pnpm --filter landing build
      - name: Test
        # -r runs recursively across workspace packages;
        # --if-present skips packages that don't declare a test script.
        run: pnpm -r --workspace-concurrency=1 --if-present test

  docker:
    name: Docker · build image
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Build image
        run: docker build -t koris:ci .
