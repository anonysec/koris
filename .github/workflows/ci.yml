name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend · pnpm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Enable pnpm
        run: corepack enable
      - name: Install
        run: pnpm install --no-frozen-lockfile
      - name: Build
        run: |
          pnpm --filter admin build
          pnpm --filter portal build
          pnpm --filter landing build
      - name: Stage SPA assets
        # upload-artifact strips the common parent of the glob paths, which
        # would drop the leading "web/" and break //go:embed (it expects
        # web/{admin,portal,landing}/www). Stage the dirs under a temp root
        # that preserves the web/<app>/www prefix, then upload that root.
        # NOTE: this job's working-directory is "web", so the build output is
        # at admin/www, portal/www, landing/www (relative to here).
        run: |
          rm -rf /tmp/spa
          mkdir -p /tmp/spa/web/admin/www /tmp/spa/web/portal/www /tmp/spa/web/landing/www
          cp -r admin/www/.  /tmp/spa/web/admin/www/
          cp -r portal/www/. /tmp/spa/web/portal/www/
          cp -r landing/www/. /tmp/spa/web/landing/www/
      - name: Upload SPA assets
        # The Go binary embeds web/{admin,portal,landing}/www at build time
        # (//go:embed). A fresh checkout has no built assets, so we pass
        # the freshly-built www/ dirs to the backend job as artifacts.
        uses: actions/upload-artifact@v4
        with:
          name: spa-www
          if-no-files-found: error
          path: /tmp/spa
      - name: Test
        # -r runs recursively across workspace packages;
        # --if-present skips packages that don't declare a test script.
        run: pnpm -r --workspace-concurrency=1 --if-present test

  backend:
    name: Backend · Go
    runs-on: ubuntu-latest
    needs: [frontend]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: koris_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test -d koris_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Download SPA assets
        # Populate web/{admin,portal,landing}/www so //go:embed resolves.
        uses: actions/download-artifact@v4
        with:
          name: spa-www
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: Verify modules
        run: go mod verify
      - name: Vet
        run: go vet ./...
      - name: Build (full)
        run: go build ./cmd/panel
      - name: Build (lite)
        run: go build -tags lite ./cmd/panel
      - name: Test
        env:
          KORIS_TEST_MIGRATIONS: ${{ github.workspace }}/migrations
        run: go test ./... -count=1 -timeout=120s

  docker:
    name: Docker · build image
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Build image
        run: docker build -t koris:ci .
