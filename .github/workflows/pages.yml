name: Docs (GitHub Pages)

# Builds the Markdown in docs/ into a static documentation site and deploys it
# to GitHub Pages. Enable once in repo Settings → Pages → Source: GitHub Actions.

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'install.sh'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install builder
        run: pip install markdown pymdown-extensions

      - name: Build site
        run: python docs/_build.py

      - name: Include install.sh at site root
        run: cp install.sh _site/install.sh

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          # Ride out GitHub Pages' transient "Deployment failed, try again
          # later" errors instead of failing the check: poll longer and
          # tolerate more transient errors before giving up.
          timeout: 600000        # 10 min (ms) to wait for the deployment
          error_count: 25        # allow more transient API errors before failing
          reporting_interval: 5000
