name: Release

# Cut a release:
#   git tag v0.93.0
#   git push origin v0.93.0
#
# This workflow builds Go binaries (full + lite, amd64 + arm64) with embedded
# frontends, publishes them as GitHub Release artifacts with checksums, and
# pushes multi-arch Docker images to ghcr.io/anonysec/koris.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.93.0)'
        required: true

permissions:
  contents: write   # create releases
  packages: write   # push to ghcr

env:
  VERSION: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  # ─── Build frontend assets once, share across all binary builds ──────────
  frontend:
    name: Build frontend assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: corepack enable
      - name: Install
        working-directory: web
        run: pnpm install --no-frozen-lockfile
      - name: Build all frontends
        working-directory: web
        env:
          KORIS_ADMIN_BASE: /admin/
          KORIS_PORTAL_BASE: /account/
        run: |
          pnpm --filter admin build
          pnpm --filter portal build
          pnpm --filter landing build
      - name: Upload built frontends
        uses: actions/upload-artifact@v4
        with:
          name: frontend-www
          path: |
            web/admin/www
            web/portal/www
            web/landing/www
          if-no-files-found: error
          retention-days: 1

  # ─── Cross-compile Go binaries for each (os, arch, edition) combo ────────
  binaries:
    name: Build ${{ matrix.edition }} · ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: frontend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
        edition: [full, lite]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      # Restore the shared frontend build into the tree so //go:embed picks it up
      - name: Download frontend assets
        uses: actions/download-artifact@v4
        with:
          name: frontend-www
          path: web

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          set -euxo pipefail
          out="koris-${{ matrix.edition }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          # Full = default (no build tag). Lite = -tags lite.
          if [ "${{ matrix.edition }}" = "lite" ]; then
            tagflag="-tags lite"
          else
            tagflag=""
          fi
          go build -trimpath \
            -ldflags="-s -w -X main.Version=${VERSION#v}" \
            $tagflag \
            -o "$out" \
            ./cmd/panel
          # Also build the migrate-db helper (useful for release too)
          go build -trimpath -ldflags="-s -w" \
            -o "koris-migrate-${{ matrix.goos }}-${{ matrix.goarch }}" \
            ./cmd/migrate-db

      - name: Package
        run: |
          set -euxo pipefail
          out="koris-${{ matrix.edition }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          mig="koris-migrate-${{ matrix.goos }}-${{ matrix.goarch }}"
          # Tarball each binary bundled with migrations/
          tar czf "${out}.tar.gz" \
            "$out" "$mig" migrations/ install.sh deploy/
          sha256sum "${out}.tar.gz" > "${out}.tar.gz.sha256"
          sha256sum "$out"          > "${out}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.edition }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            koris-${{ matrix.edition }}-${{ matrix.goos }}-${{ matrix.goarch }}
            koris-${{ matrix.edition }}-${{ matrix.goos }}-${{ matrix.goarch }}.sha256
            koris-${{ matrix.edition }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
            koris-${{ matrix.edition }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz.sha256
          retention-days: 1

  # ─── Build multi-arch Docker images and push to GHCR ─────────────────────
  docker:
    name: Docker image · ghcr.io/${{ github.repository_owner }}/koris
    needs: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend assets
        uses: actions/download-artifact@v4
        with:
          name: frontend-www
          path: web

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/koris
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      # The main Dockerfile does its own pnpm build step. For releases we
      # want to skip that and just embed the already-built www/ trees. We
      # write a lean release Dockerfile inline to keep the source tree clean.
      - name: Write release Dockerfile
        run: |
          cat > Dockerfile.release <<'EOF'
          FROM golang:1.25-alpine AS builder
          WORKDIR /build
          COPY go.mod go.sum ./
          RUN go mod download
          COPY . .
          ARG TARGETOS
          ARG TARGETARCH
          ARG VERSION=dev
          RUN CGO_ENABLED=0 GOOS=$TARGETOS GOARCH=$TARGETARCH \
              go build -trimpath -ldflags="-s -w -X main.Version=${VERSION}" \
              -o /koris ./cmd/panel

          FROM alpine:3.20
          RUN apk add --no-cache ca-certificates tzdata curl
          WORKDIR /app
          COPY --from=builder /koris /app/koris
          COPY --from=builder /build/migrations /app/migrations
          HEALTHCHECK --interval=15s --timeout=5s --retries=3 --start-period=15s \
            CMD curl -skf https://localhost:443/api/health || \
                curl -sf http://localhost:8080/api/health || exit 1
          ENTRYPOINT ["/app/koris"]
          EOF

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Publish the GitHub Release with all binary artifacts attached ───────
  publish:
    name: Publish GitHub Release
    needs: [binaries, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          path: release-assets
          merge-multiple: true

      - name: Generate combined checksums file
        working-directory: release-assets
        run: |
          set -euxo pipefail
          ls -la
          sha256sum koris-* > SHA256SUMS
          cat SHA256SUMS

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          set -e
          VERSION=${VERSION#v}
          # Look for a "## [x.y.z]" or "## x.y.z" heading in CHANGELOG.md and
          # extract until the next such heading.
          if [ -f CHANGELOG.md ]; then
            awk -v ver="$VERSION" '
              $0 ~ "^## \\[?"ver"\\]?" {flag=1; next}
              flag && /^## / {exit}
              flag {print}
            ' CHANGELOG.md > release-notes.md
          fi
          if [ ! -s release-notes.md ]; then
            echo "Release ${VERSION}" > release-notes.md
            echo "" >> release-notes.md
            echo "See CHANGELOG.md for details." >> release-notes.md
          fi
          cat release-notes.md

      - name: Create/update GitHub Release + upload assets (via API)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ env.VERSION }}
        run: |
          set -euo pipefail
          # gh CLI is preinstalled on the ubuntu-latest runner.
          prerelease_flag=""
          case "$TAG" in *-*) prerelease_flag="--prerelease" ;; esac

          # If a release for this tag already exists, delete it (idempotent re-runs).
          gh release delete "$TAG" --yes --repo "${{ github.repository }}" 2>/dev/null || true

          # Create the release + upload every asset in one shot.
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            --notes-file release-notes.md \
            --latest \
            $prerelease_flag \
            release-assets/koris-*.tar.gz \
            release-assets/koris-*.tar.gz.sha256 \
            release-assets/koris-full-linux-* \
            release-assets/koris-lite-linux-* \
            release-assets/SHA256SUMS
