name: Release

# Cut a release:
#   git tag v0.93.0
#   git push origin v0.93.0
#
# Publishes RAW BINARIES only (one per edition × arch) plus a single
# SHA256SUMS to the GitHub Release, and pushes a multi-arch Docker image to
# ghcr.io/anonysec/koris. No source tarballs are attached — anyone who wants
# the source can clone the repo (GitHub's auto-generated "Source code
# (zip/tar.gz)" links remain available on every release).

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.93.0)'
        required: true

permissions:
  contents: read    # minimal top-level; jobs escalate as needed
  packages: read

env:
  VERSION: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  # ─── Build frontend assets once, share across all binary builds ──────────
  frontend:
    name: Build frontend assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: corepack enable
      - name: Install
        working-directory: web
        run: pnpm install --no-frozen-lockfile
      - name: Build all frontends
        working-directory: web
        env:
          KORIS_ADMIN_BASE: /admin/
          KORIS_PORTAL_BASE: /account/
        run: |
          pnpm --filter admin build
          pnpm --filter portal build
          pnpm --filter landing build
      - name: Upload built frontends
        uses: actions/upload-artifact@v4
        with:
          name: frontend-www
          path: |
            web/admin/www
            web/portal/www
            web/landing/www
          if-no-files-found: error
          retention-days: 1

  # ─── Cross-compile Go binaries for each (arch, edition) combo ────────────
  binaries:
    name: Build ${{ matrix.edition }} · linux/${{ matrix.goarch }}
    needs: frontend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
        edition: [full, lite]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Download frontend assets
        uses: actions/download-artifact@v4
        with:
          name: frontend-www
          path: web

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          EDITION: ${{ matrix.edition }}
        run: |
          set -euxo pipefail
          # 'full' has no build tag, 'lite' uses -tags lite.
          if [ "$EDITION" = "lite" ]; then TAGFLAG="-tags lite"; else TAGFLAG=""; fi

          # Self-contained binary: frontends are embedded and migrations are
          # applied from the embedded FS, so the release artifact is a single
          # executable named koris-<edition>-linux-<arch>.
          OUT="koris-${EDITION}-linux-${GOARCH}"
          go build -trimpath \
            -ldflags="-s -w -X main.Version=${VERSION#v}" \
            $TAGFLAG \
            -o "$OUT" \
            ./cmd/panel
          chmod +x "$OUT"
          ls -la "$OUT"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.edition }}-${{ matrix.goarch }}
          path: koris-${{ matrix.edition }}-linux-${{ matrix.goarch }}
          retention-days: 1

  # ─── Build multi-arch Docker images and push to GHCR ─────────────────────
  docker:
    name: Docker image · ghcr.io/${{ github.repository_owner }}/koris
    needs: frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push to ghcr.io
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
        with:
          persist-credentials: false
      - name: Download frontend assets
        uses: actions/download-artifact@v4
        with:
          name: frontend-www
          path: web
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/koris
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Write release Dockerfile
        run: |
          cat > Dockerfile.release <<'EOF'
          FROM golang:1.25-alpine AS builder
          WORKDIR /build
          COPY go.mod go.sum ./
          RUN go mod download
          COPY . .
          ARG TARGETOS
          ARG TARGETARCH
          ARG VERSION=dev
          RUN CGO_ENABLED=0 GOOS=$TARGETOS GOARCH=$TARGETARCH \
              go build -trimpath -ldflags="-s -w -X main.Version=${VERSION}" \
              -o /koris ./cmd/panel

          FROM alpine:3.20
          RUN apk add --no-cache ca-certificates tzdata curl
          WORKDIR /app
          COPY --from=builder /koris /app/koris
          COPY --from=builder /build/migrations /app/migrations
          HEALTHCHECK --interval=15s --timeout=5s --retries=3 --start-period=15s \
            CMD curl -skf https://localhost:443/api/health || \
                curl -sf http://localhost:8080/api/health || exit 1
          ENTRYPOINT ["/app/koris"]
          EOF
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Publish the GitHub Release with raw binaries + one checksums file ────
  publish:
    name: Publish GitHub Release
    needs: [binaries, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create releases + upload assets
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
        with:
          persist-credentials: false

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: release-assets
          merge-multiple: true

      - name: Generate SHA256SUMS
        working-directory: release-assets
        run: |
          set -euxo pipefail
          ls -la
          chmod +x koris-* || true
          sha256sum koris-* > SHA256SUMS
          cat SHA256SUMS

      - name: Extract release notes from CHANGELOG
        run: |
          set -e
          VER=${VERSION#v}
          if [ -f CHANGELOG.md ]; then
            awk -v ver="$VER" '
              $0 ~ "^## \\[?"ver"\\]?" {flag=1; next}
              flag && /^## / {exit}
              flag {print}
            ' CHANGELOG.md > release-notes.md
          fi
          if [ ! -s release-notes.md ]; then
            printf "Release %s\n\nSee CHANGELOG.md for details.\n" "$VERSION" > release-notes.md
          fi
          cat release-notes.md

      - name: Create/replace GitHub Release + upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ env.VERSION }}
        run: |
          set -euo pipefail
          prerelease_flag=""
          case "$TAG" in *-*) prerelease_flag="--prerelease" ;; esac
          # Idempotent: delete any existing release for this tag first.
          gh release delete "$TAG" --yes --repo "${{ github.repository }}" 2>/dev/null || true
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            --notes-file release-notes.md \
            --latest \
            $prerelease_flag \
            release-assets/koris-full-linux-amd64 \
            release-assets/koris-full-linux-arm64 \
            release-assets/koris-lite-linux-amd64 \
            release-assets/koris-lite-linux-arm64 \
            release-assets/SHA256SUMS
