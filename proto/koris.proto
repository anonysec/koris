syntax = "proto3";

package korispb;
option go_package = "github.com/anonysec/koris/proto/korispb";

// Gateway to Worker communication
service WorkerService {
  rpc TriggerBilling (TriggerBillingRequest) returns (JobResponse);
  rpc TriggerInvoice (TriggerInvoiceRequest) returns (JobResponse);
  rpc TriggerEmail (TriggerEmailRequest) returns (JobResponse);
  rpc TriggerReport (TriggerReportRequest) returns (JobResponse);
  rpc GetJobStatus (GetJobStatusRequest) returns (GetJobStatusResponse);
  rpc StreamMetrics (stream WorkerMetrics) returns (stream WorkerAck);
}

message TriggerBillingRequest {
  string username = 1;
  string period_start = 2;
  string period_end = 3;
}

message TriggerInvoiceRequest {
  int64 customer_id = 1;
  string period_start = 2;
  string period_end = 3;
}

message TriggerEmailRequest {
  string to = 1;
  string subject = 2;
  string body = 3;
  string template = 4;
  map<string, string> vars = 5;
}

message TriggerReportRequest {
  string report_type = 1;
  string period_start = 2;
  string period_end = 3;
  int64 admin_id = 4;
}

message GetJobStatusRequest {
  string job_id = 1;
}

message GetJobStatusResponse {
  string job_id = 1;
  string status = 2; // queued, running, completed, failed
  string result = 3;
  string error = 4;
  int64 progress = 5;
}

message JobResponse {
  string job_id = 1;
  bool accepted = 2;
}

message WorkerMetrics {
  int32 jobs_processed = 1;
  int32 jobs_queued = 2;
  int32 jobs_failed = 3;
  double cpu_usage = 4;
  int64 mem_usage_bytes = 5;
}

message WorkerAck {
  bool ok = 1;
}
